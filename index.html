<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>UML Diagram Generator</title>

  <!-- PlantUML Encoder CDN -->
  <script src="https://cdn.jsdelivr.net/npm/plantuml-encoder/dist/plantuml-encoder.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      text-align: center;
      padding: 20px;
    }

    h1 {
      margin-bottom: 20px;
    }

    textarea {
      width: 90%;
      height: 200px;
      padding: 10px;
      font-family: monospace;
      font-size: 14px;
      border-radius: 10px;
      border: 1px solid #ccc;
      resize: none;
    }

    button {
      margin-top: 15px;
      padding: 10px 20px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: #007bff;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }

    #diagram {
      margin-top: 20px;
      max-width: 95%;
      border: 1px solid #ccc;
      border-radius: 10px;
      background: white;
      padding: 10px;
    }
  </style>
</head>

<body>

  <h1>UML Diagram Generator</h1>

  <textarea id="umlInput">
@startuml
class Student {
  -id: int
  -name: string
}

class Course {
  -courseName: string
}

Student --> Course : enrolls
@enduml
  </textarea>

  <br>

  <button onclick="generateDiagram()">Generate Diagram</button>

  <br>

  <img id="diagram" />

  <script>
    function generateDiagram() {
      const code = document.getElementById("umlInput").value;

      try {
        const encoded = plantumlEncoder.encode(code);

        const url = "https://www.plantuml.com/plantuml/png/" + encoded;

        document.getElementById("diagram").src = url;
      } catch (error) {
        alert("Error generating diagram. Check your UML code.");
        console.error(error);
      }
    }
  </script>

</body>
</html>
